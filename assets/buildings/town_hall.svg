<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Cozy flat sprite: Town Hall (64x64), transparent background -->
  <ellipse cx="32" cy="52" rx="22" ry="6.5" fill="#1b1b1b" opacity="0.16"/>

  <!-- Main body -->
  <rect x="14" y="24" width="36" height="28" rx="6" fill="#e6d6b3"/>
  <rect x="16" y="26" width="32" height="24" rx="5" fill="#f0e2c1"/>
  <rect x="14" y="24" width="36" height="28" rx="6" fill="#000" opacity="0.05"/>

  <!-- Red roof -->
  <path d="M10 26 L32 12 L54 26 L54 32 L10 32 Z" fill="#c46a6a"/>
  <path d="M32 12 L54 26 L54 32 L32 32 Z" fill="#000" opacity="0.08"/>
  <path d="M10 26 L32 12 L54 26" fill="none" stroke="#fff" stroke-opacity="0.22" stroke-width="2" stroke-linecap="round"/>

  <!-- Small tower -->
  <rect x="27" y="14" width="10" height="14" rx="3" fill="#e6d6b3"/>
  <path d="M25 16 L32 10 L39 16 L39 19 L25 19 Z" fill="#b85f5f"/>
  <rect x="30" y="20" width="4" height="8" rx="2" fill="#8cc3d8"/>

  <!-- Door + steps -->
  <rect x="28" y="34" width="8" height="18" rx="3" fill="#8f5f3f"/>
  <rect x="24" y="50" width="16" height="3" rx="1.5" fill="#000" opacity="0.10"/>

  <!-- Windows -->
  <rect x="19" y="34" width="6" height="6" rx="2" fill="#8cc3d8"/>
  <rect x="39" y="34" width="6" height="6" rx="2" fill="#8cc3d8"/>
  <path d="M19 37 H25 M22 34 V40" stroke="#fff" stroke-opacity="0.45" stroke-width="1"/>
  <path d="M39 37 H45 M42 34 V40" stroke="#fff" stroke-opacity="0.45" stroke-width="1"/>

  <!-- Flag -->
  <path d="M38 10 V18" stroke="#6a6a6a" stroke-width="2" stroke-linecap="round"/>
  <path d="M38 11 C43 11, 44 13, 48 13 C44 14, 43 16, 38 16 Z" fill="#8cc3d8"/>
</svg>
